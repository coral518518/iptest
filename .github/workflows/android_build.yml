name: Android Build ## name of the workflow

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  android-build:
    name: Android Build
    runs-on: ubuntu-latest # using ubuntu latest version / or you can use a specific version

    steps:
      - name: Check out Git repository # clone the repo to local ci workspace
        uses: actions/checkout@v3

      - name: Set up our JDK environment # setup JDK environment: mandatory as we need to build  android project
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: 11

      - name: Clean conflicting Android SDK components
        run: |
          rm -rf $ANDROID_SDK_ROOT/sdk-extensions
          # 动态移除所有高于 API 33 的干扰组件 (支持目前已出现的 34, 35, 36, 37 等)
          ls -d $ANDROID_SDK_ROOT/platforms/android-* | grep -vE "android-(33|32|31|30|29|28|27|26|25|24|23|21)" | xargs rm -rf || true

      - name: Check Java Version
        run: java -version

      - name: Set up our Node version
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies 
        run: npm ci 

      - name: Create .env file
        run: |
          echo "CODE_PUSH_DEPLOYMENT_KEY=${{ secrets.CODE_PUSH_DEPLOYMENT_KEY }}" >> .env
          echo "APP_CENTER_SECRET=${{ secrets.APP_CENTER_SECRET }}" >> .env
          echo "NODE_ENV=${{ secrets.NODE_ENV }}" >> .env

      # configure cash for gradle : will help to reduce build time
      - name: Cache Gradle Wrapper
        uses: actions/cache@v3
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-caches-
      
      - name: Make Gradlew Executable
        run: cd android && chmod +x ./gradlew

      - name: Generate App APK
        run: |
          npm run build:release
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          APP_CENTER_SECRET: ${{ secrets.APP_CENTER_SECRET }}
          CODE_PUSH_DEPLOYMENT_KEY: ${{ secrets.CODE_PUSH_DEPLOYMENT_KEY }}
          NODE_ENV: ${{ secrets.NODE_ENV }}

      ## Detect installed build-tools version dynamically
      - name: Setup build tool version variable
        shell: bash
        run: |
          BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "BUILD_TOOLS_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
          echo "Using build tools version: $BUILD_TOOL_VERSION"

      ## sign generated apk
      - name: Sign APK
        id: sign_app
        uses: iota9star/sign-android-release@v1.0.5
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.MYAPP_UPLOAD_STORE_FILE_BASE64 }}
          alias: ${{ secrets.MYAPP_UPLOAD_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}
          keyPassword: ${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOLS_VERSION }}

      - name: Upload artifact to App Center
        uses: wzieba/AppCenter-Github-Action@v1
        with:
          appName: xianshenglu/cloudflare-ip-tester-app
          token: ${{secrets.APP_CENTER_TOKEN}}
          group: Collaborators
          file: android/app/build/outputs/apk/release/app-universal-release-signed.apk
          notifyTesters: true
          debug: false

      - name: test
        id: test
        run: |
          echo "${{ github.workspace }}/${{ fromJson(steps.sign_app.outputs.signedReleaseFiles)[0] }}"
          echo "${{ github.workspace }}/${{ fromJson(steps.sign_app.outputs.signedReleaseFiles)[1] }}"
          echo "${{ github.workspace }}/${{ fromJson(steps.sign_app.outputs.signedReleaseFiles)[2] }}"
          echo "${{ github.workspace }}/${{ fromJson(steps.sign_app.outputs.signedReleaseFiles)[3] }}"
          echo "${{ github.workspace }}/${{ fromJson(steps.sign_app.outputs.signedReleaseFiles)[4] }}"